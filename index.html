<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARIBOW Availability Request</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f8fb;
      color: #111827;
      margin: 0;
      padding: 24px;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 13px;
      font-weight: 700;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 11px 12px;
      font-size: 14px;
    }
    textarea {
      min-height: 96px;
    }
    button {
      margin-top: 18px;
      border: none;
      background: #111827;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #2563eb;
    }
    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>HARIBOW Availability Request</h1>
    <p>
      Please submit your preferred period and basic event details.
      HARIBOW will review availability and contact you shortly.
    </p>

    <form id="requestForm">
      <label>Agency / Company</label>
      <input name="agent_name" required placeholder="Agency name" />

      <label>Contact Name</label>
      <input name="contact_name" required placeholder="Your name" />

      <label>Email</label>
      <input name="email" type="email" required placeholder="name@example.com" />

      <div class="grid">
        <div>
          <label>Start Date</label>
          <input name="start_date" type="date" required />
        </div>
        <div>
          <label>End Date</label>
          <input name="end_date" type="date" required />
        </div>
      </div>

      <label>Teams Requested</label>
      <select name="teams_requested" required>
        <option value="1">1 team</option>
        <option value="2">2 teams</option>
        <option value="3">3 teams</option>
        <option value="4">4 teams</option>
      </select>

      <label>Location</label>
      <input name="location" placeholder="Country / City" />

      <label>Note</label>
      <textarea name="note" placeholder="Event type, schedule, budget, special requests, etc."></textarea>

      <button type="submit">Submit Request</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const API_URL = "/api/request";

    const form = document.getElementById("requestForm");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      statusEl.textContent = "Submitting...";

      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!result.ok) {
          throw new Error(result.error || "Submission failed.");
        }

        statusEl.textContent = "Request submitted. HARIBOW will contact you shortly.";
        form.reset();

      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
